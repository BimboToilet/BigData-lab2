services:
  namenode:
    image: apache/hadoop:3.3.6
    hostname: namenode
    environment:
      - HADOOP_DAEMON_TYPE=namenode
      - ENSURE_NAMENODE_DIR=/tmp/hadoop-root/dfs/name
    volumes:
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["/bin/bash", "-c", "hdfs namenode -format -force && hdfs namenode"]
    ports:
      - "9870:9870"
    networks: [spark-hdfs]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9870"]
      interval: 10s
      timeout: 5s
      retries: 5

  datanode-1:
    image: apache/hadoop:3.3.6
    environment:
      - HADOOP_DAEMON_TYPE=datanode
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["hdfs", "datanode"]
    profiles: ["1dn", "3dn"]
    networks: [spark-hdfs]

  datanode-2:
    image: apache/hadoop:3.3.6
    environment:
      - HADOOP_DAEMON_TYPE=datanode
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["hdfs", "datanode"]
    profiles: ["3dn"]
    networks: [spark-hdfs]

  datanode-3:
    image: apache/hadoop:3.3.6
    environment:
      - HADOOP_DAEMON_TYPE=datanode
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    command: ["hdfs", "datanode"]
    profiles: ["3dn"]
    networks: [spark-hdfs]

  spark-master:
    image: apache/spark:3.5.3
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
      - HADOOP_CFG_CORE_SITE_FS_DEFAULTFS=hdfs://namenode:9000
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    volumes:
      - ./spark/log4j2.properties:/opt/spark/conf/log4j2.properties
    ports:
      - "8080:8080"
    networks: [spark-hdfs]

  spark-worker:
    image: apache/spark:3.5.3
    environment:
      - SPARK_MODE=worker
      - HADOOP_CFG_CORE_SITE_FS_DEFAULTFS=hdfs://namenode:9000
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    volumes:
      - ./spark/log4j2.properties:/opt/spark/conf/log4j2.properties
    depends_on:
      spark-master:
        condition: service_started
    networks: [spark-hdfs]

  dataset-generator:
    image: python:3.9-slim
    volumes:
      - ./data:/data
      - ./apps:/apps
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install pandas numpy
        python /apps/generate_dataset.py
    profiles: ["1dn", "3dn"]
    networks: [spark-hdfs]

  experiment-runner:
    build:
      context: ./experiment_runner
      dockerfile: Dockerfile
    depends_on:
      namenode:
        condition: service_healthy
      spark-master:
        condition: service_started
      dataset-generator:
        condition: service_completed_successfully 
    user: root
    environment:
      - HADOOP_USER_NAME=hadoop
      - OPTIMIZE
      - REQUIRED_DN
      - SPARK_MASTER_URL=spark://spark-master:7077
      - HADOOP_CFG_CORE_SITE_FS_DEFAULTFS=hdfs://namenode:9000
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
    volumes:
      - ./spark/log4j2.properties:/opt/spark/conf/log4j2.properties
      - ./apps:/apps
      - ./data:/data
      - ./scripts/run.sh:/run.sh
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    entrypoint: ["/bin/bash", "/run.sh"]
    profiles: ["1dn", "3dn"]
    networks: [spark-hdfs]

networks:
  spark-hdfs:
    driver: bridge